name: Release
on:
  workflow_call:
    secrets:
      GH_TOKEN:
        required: true

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libgl1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable
        run: python -m PyInstaller --clean --noconfirm portfolium.spec

      # ── Linux ──────────────────────────────────────────────────────────────
      - name: Rename Linux executable
        if: matrix.platform == 'linux'
        run: mv dist/portfolium dist/portfolium-linux

      - name: Create source zip
        if: matrix.platform == 'linux'
        run: |
          zip -r dist/portfolium-source.zip \
            portfolium \
            example_data \
            requirements.txt \
            README.md \
            LICENSE

      - name: Upload Linux executable
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: portfolium-linux
          path: dist/portfolium-linux

      - name: Upload source zip
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: portfolium-source
          path: dist/portfolium-source.zip

      # ── Windows ────────────────────────────────────────────────────────────
      - name: Rename Windows executable
        if: matrix.platform == 'windows'
        shell: pwsh
        run: Move-Item dist\portfolium.exe dist\portfolium-windows.exe

      - name: Upload Windows executable
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: portfolium-windows
          path: dist/portfolium-windows.exe

      # ── macOS ──────────────────────────────────────────────────────────────
      - name: Create macOS DMG
        if: matrix.platform == 'macos'
        run: |
          mkdir -p dmg_staging
          cp -r "dist/Portfolium.app" dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create \
            -volname "Portfolium" \
            -srcfolder dmg_staging \
            -ov \
            -format UDZO \
            dist/portfolium-macos.dmg

      - name: Upload macOS DMG
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v7
        with:
          name: portfolium-macos
          path: dist/portfolium-macos.dmg

  release:
    name: Semantic Release
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: release
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download Linux executable
        uses: actions/download-artifact@v6
        with:
          name: portfolium-linux
          path: dist

      - name: Download source zip
        uses: actions/download-artifact@v6
        with:
          name: portfolium-source
          path: dist

      - name: Download Windows executable
        uses: actions/download-artifact@v6
        with:
          name: portfolium-windows
          path: dist

      - name: Download macOS DMG
        uses: actions/download-artifact@v6
        with:
          name: portfolium-macos
          path: dist

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'

      - name: Run semantic-release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm install
          npx semantic-release

