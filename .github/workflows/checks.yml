name: Checks
on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate dependency resolution
        run: python -m pip check

      - name: Validate Python syntax
        run: python -m compileall -q portfolium tests

      - name: Check formatting (Ruff)
        run: ruff format --check portfolium tests

      - name: Lint (Ruff)
        run: ruff check portfolium tests


  dependency-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Cache pip
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check outdated dependencies
        run: |
          pip list --outdated --format=json > dependency-updates.txt || true
          if [ ! -s dependency-updates.txt ]; then
            echo "All dependencies are up to date." > dependency-updates.txt
          fi

      - name: Publish dependency updates report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-updates-report
          path: dependency-updates.txt
